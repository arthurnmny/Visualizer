<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Baby Feedback Review</title>
  <style>
    :root {
      --ink: #202124;
      --muted: #686f75;
      --line: #d9d4cc;
      --paper: #fffaf2;
      --accent: #8f6f52;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--paper);
      color: var(--ink);
      font-family: Arial, Helvetica, sans-serif;
      line-height: 1.5;
    }

    .page {
      width: min(1100px, calc(100% - 32px));
      margin: 0 auto;
      padding: 32px 0 56px;
    }

    header {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: end;
      border-bottom: 1px solid var(--line);
      padding-bottom: 22px;
      margin-bottom: 22px;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 6vw, 4rem);
      line-height: 1.05;
    }

    p {
      margin: 8px 0 0;
      color: var(--muted);
    }

    .toolbar, .message {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.45);
      padding: 16px;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 18px;
    }

    button {
      min-height: 42px;
      border: 1px solid var(--line);
      padding: 0 12px;
      font: inherit;
    }

    button {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
      cursor: pointer;
      white-space: nowrap;
    }

    .list {
      display: grid;
      gap: 12px;
    }

    .message {
      display: grid;
      gap: 10px;
    }

    .message-header {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .message strong { color: var(--ink); }

    .message-body { white-space: pre-wrap; }

    .status {
      color: var(--muted);
      min-height: 1.4em;
    }

    @media (max-width: 700px) {
      header, .toolbar, .message-header { display: grid; }
    }
  </style>
</head>
<body>
  <main class="page">
    <header>
      <div>
        <h1>Baby feedback</h1>
        <p>Private review page for submitted advice and acknowledgements.</p>
      </div>
      <button id="refresh-button" type="button">Refresh</button>
    </header>

    <section class="toolbar" aria-label="Feedback tools">
      <div id="count-label">No messages loaded.</div>
      <button id="export-button" type="button">Export JSON</button>
    </section>

    <section id="feedback-list" class="list" aria-label="Submitted feedback"></section>
  </main>

  <script>
    const refreshButton = document.querySelector('#refresh-button');
    const exportButton = document.querySelector('#export-button');
    const countLabel = document.querySelector('#count-label');
    const list = document.querySelector('#feedback-list');
    let messages = [];

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (char) => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;',
      }[char]));
    }

    function formatDate(value) {
      return new Intl.DateTimeFormat(undefined, {
        dateStyle: 'medium',
        timeStyle: 'short',
      }).format(new Date(value));
    }

    function renderMessages() {
      countLabel.textContent = messages.length === 1
        ? '1 message loaded.'
        : `${messages.length} messages loaded.`;

      list.innerHTML = messages.map((message) => `
        <article class="message">
          <div class="message-header">
            <span><strong>${escapeHtml(message.name)}</strong>${message.relationship ? `, ${escapeHtml(message.relationship)}` : ''}</span>
            <span>${formatDate(message.created_at)}</span>
          </div>
          <div>
            <strong>${escapeHtml(message.message_type)}</strong>
            ${message.email ? `<span> from ${escapeHtml(message.email)}</span>` : ''}
            ${message.shareable ? '<span> - shareable</span>' : ''}
          </div>
          <div class="message-body">${escapeHtml(message.message)}</div>
        </article>
      `).join('');
    }

    async function loadMessages() {
      countLabel.textContent = 'Loading...';

      try {
        const response = await fetch('/api/baby-feedback');

        if (!response.ok) throw new Error('Unable to load messages');

        messages = await response.json();
        renderMessages();
      } catch (error) {
        countLabel.textContent = 'Could not load messages.';
      }
    }

    refreshButton.addEventListener('click', loadMessages);

    exportButton.addEventListener('click', () => {
      const blob = new Blob([JSON.stringify(messages, null, 2)], {
        type: 'application/json',
      });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = 'baby-feedback.json';
      link.click();
      URL.revokeObjectURL(url);
    });

    loadMessages();
  </script>
</body>
</html>
